    .btn-dark { background: #0f3460; }

    #search {

    }

    #info-panel {
      position: absolute; bottom: 30px; right: 10px; z-index: 1000;
      background: rgba(22,33,62,0.93); border: 1px solid #0f3460;
      border-radius: 10px; padding: 12px 16px; min-width: 180px;
      display: none; backdrop-filter: blur(6px); color: #eee;

    #info-panel b { color: #fff; }
    .close-btn { float: right; cursor: pointer; color: #e94560; font-weight: bold; font-size: 15px; }
    #stats {
      position: absolute; bottom: 30px; left: 10px; z-index: 1000;
      background: rgba(22,33,62,0.88); border: 1px solid #0f3460;
      border-radius: 10px; padding: 10px 14px; backdrop-filter: blur(6px);
    }
    #stats p { font-size: 11px; color: #aaa; margin: 2px 0; }

    #coords {
      position: absolute; bottom: 0; left: 0; z-index: 1000;

const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '© Esri', maxZoom: 20
});
const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap', maxZoom: 20
});

const map = L.map('map', { layers: [satLayer], zoomControl: true });
let isSat = true;

// Força o mapa a recalcular tamanho após carregar
window.addEventListener('load', function() {
  setTimeout(function() { map.invalidateSize(); fitAll(); }, 300);
});

function toggleLayer() {
  if (isSat) { map.removeLayer(satLayer); osmLayer.addTo(map); }
  else { map.removeLayer(osmLayer); satLayer.addTo(map); }
  isSat = !isSat;
}

map.on('mousemove', e => {
  document.getElementById('coords').textContent =
    'Lat: ' + e.latlng.lat.toFixed(6) + '  Lon: ' + e.latlng.lng.toFixed(6);
});

const colors = ['#e94560','#4ecca3','#f5a623','#7ed6df','#e056fd','#badc58','#ff7675','#74b9ff','#fd79a8','#55efc4','#ffeaa7','#a29bfe'];
let allLayers = [], labelMarkers = [], labelsVisible = true;

let totalArea = 0;
geojsonData.features.forEach(f => { totalArea += parseFloat(f.properties.AREA || 0); });
document.getElementById('s-count').textContent = geojsonData.features.length;
document.getElementById('s-area').textContent = totalArea.toFixed(2);

const geoLayer = L.geoJSON(geojsonData, {
  style: feature => {
    const idx = parseInt(feature.properties.TALHAO || 0) % colors.length;
    return { color: '#fff', weight: 1.2, fillColor: colors[idx], fillOpacity: 0.45 };
  },
  onEachFeature: (feature, layer) => {
    const p = feature.properties;
    allLayers.push({ layer, talhao: p.TALHAO, nome: p.NOME });
    const center = layer.getBounds().getCenter();
    const m = L.marker(center, {
      icon: L.divIcon({
        className: '',
        html: '<div style="background:rgba(0,0,0,0.65);color:#fff;padding:2px 5px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;pointer-events:none">' + p.TALHAO + '</div>',
        iconAnchor: [16, 10]
      }),
      interactive: false
    });
    labelMarkers.push(m);
    m.addTo(map);
    layer.on('click', () => {
      document.getElementById('i-talhao').textContent = p.TALHAO;
      document.getElementById('i-nome').textContent = p.NOME;
      document.getElementById('i-area').textContent = p.AREA;
      document.getElementById('info-panel').style.display = 'block';
      map.fitBounds(layer.getBounds(), { padding: [60, 60] });
    });
    layer.on('mouseover', () => layer.setStyle({ weight: 3, fillOpacity: 0.75 }));
    layer.on('mouseout', () => geoLayer.resetStyle(layer));
  }
}).addTo(map);

function fitAll() { map.invalidateSize(); map.fitBounds(geoLayer.getBounds(), { padding: [60, 60] }); }
function toggleLabels() {
  labelsVisible = !labelsVisible;
  labelMarkers.forEach(m => labelsVisible ? m.addTo(map) : map.removeLayer(m));
}
function searchTalhao(val) {
  val = val.trim().toUpperCase();
  allLayers.forEach(({ layer, talhao, nome }) => {
    if (!val || talhao.includes(val) || nome.includes(val)) geoLayer.resetStyle(layer);
    else layer.setStyle({ weight: 0.5, fillOpacity: 0.08, color: '#444' });
  });
}
function clearSearch() {
  document.getElementById('search').value = '';
  allLayers.forEach(({ layer }) => geoLayer.resetStyle(layer));
}

fitAll();
</script>
